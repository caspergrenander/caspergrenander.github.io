<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post to TikTok</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
max-width:700px;
margin:auto;
padding:30px;
}

h2{
margin-bottom:5px;
}

.section{
margin-top:35px;
}

input, textarea, select{
width:100%;
padding:12px;
margin-top:8px;
background:#1e1e1e;
border:1px solid #333;
color:white;
}

button{
margin-top:30px;
padding:14px;
width:100%;
background:#fe2c55;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

video{
width:100%;
margin-top:15px;
border-radius:8px;
}

.note{
color:#888;
font-size:13px;
margin-top:6px;
}

.prompt{
margin-top:10px;
color:#00ffa6;
}

.status{
margin-top:20px;
padding:12px;
border:1px solid #444;
}

</style>
</head>

<body>

<!-- ACCOUNT CONTEXT -->
<h2>Post to TikTok</h2>
<p>You are posting as <strong id="creatorUsername">@loading</strong></p>

<!-- TITLE -->
<div class="section">
<label>1. Add title</label>
<input id="title" maxlength="150">
</div>

<!-- VIDEO -->
<div class="section">
<label>2. Select video</label>

<input type="file" id="videoFile" accept="video/*">

<p class="note">Preview of content to be posted</p>
<video id="preview" controls style="display:none"></video>
</div>

<!-- CAPTION -->
<div class="section">
<label>3. Caption</label>
<textarea id="caption" maxlength="2200"></textarea>
</div>

<!-- PRIVACY -->
<div class="section">
<label>4. Who can view this video?</label>
<select id="privacy"></select>
</div>

<!-- INTERACTION -->
<div class="section">
<label>5. Interaction settings</label>

<div>
<input type="checkbox" id="comment">
<label>Allow comments</label>
</div>

<div>
<input type="checkbox" id="duet">
<label>Allow duet</label>
</div>

<div>
<input type="checkbox" id="stitch">
<label>Allow stitch</label>
</div>

<p class="note">
These settings follow your TikTok account permissions
</p>

</div>

<!-- COMMERCIAL -->
<div class="section">
<label>6. Commercial content disclosure</label>

<div>
<input type="checkbox" id="commercialToggle">
<label>This content promotes a brand / service</label>
</div>

<div id="commercialOptions" style="display:none">

<div>
<input type="checkbox" id="yourBrand">
<label>Your brand</label>
</div>

<div>
<input type="checkbox" id="branded">
<label>Branded content</label>
</div>

</div>

<div class="prompt" id="commercialPrompt"></div>

</div>

<!-- CONSENT -->
<div class="section">

<p id="consentText">
By posting, you agree to TikTok's Music Usage Confirmation
</p>

<div>
<input type="checkbox" id="consent">
<label>I confirm</label>
</div>

<p class="note">
You must confirm before uploading content to TikTok
</p>

</div>

<button id="publish">Publish</button>

<div class="status" id="status"></div>

<script>

let publishId;

const videoFile = document.getElementById("videoFile");
const preview = document.getElementById("preview");

videoFile.onchange = () => {

const file = videoFile.files[0];

preview.src = URL.createObjectURL(file);
preview.style.display="block";

}

document.getElementById("commercialToggle").onchange = e=>{
document.getElementById("commercialOptions").style.display =
e.target.checked ? "block" : "none";
}

document.getElementById("yourBrand").onchange =
document.getElementById("branded").onchange = ()=>{

const prompt = document.getElementById("commercialPrompt");

if(document.getElementById("branded").checked){

prompt.innerText =
"Your video will be labeled as Paid partnership";

document.getElementById("consentText").innerText =
"By posting, you agree to TikTok's Branded Content Policy and Music Usage Confirmation";

}
else if(document.getElementById("yourBrand").checked){

prompt.innerText =
"Your video will be labeled as Promotional content";

document.getElementById("consentText").innerText =
"By posting, you agree to TikTok's Music Usage Confirmation";

}
else{
prompt.innerText="";
}

}

document.getElementById("publish").onclick = async ()=>{

document.getElementById("status").innerText =
"Uploading video…";

const init = await new Promise((resolve,reject)=>{
google.script.run
.withSuccessHandler(resolve)
.withFailureHandler(reject)
.initPost({});
});

publishId = init.publish_id;

document.getElementById("status").innerText =
"Processing on TikTok servers…";

poll();

}

async function poll(){

for(let i=0;i<12;i++){

const res = await new Promise((resolve,reject)=>{
google.script.run
.withSuccessHandler(resolve)
.withFailureHandler(reject)
.getStatus(publishId);
});

if(res.status === "PUBLISHED"){

document.getElementById("status").innerText =
"Published successfully";

return;

}

await new Promise(r=>setTimeout(r,4000));

}

document.getElementById("status").innerText =
"Still processing. Please check your TikTok profile.";

}

</script>

</body>
</html>
