<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok OAuth Redirect</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0f15;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
}
.box{
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h2 id="status">Authenticating…</h2>
<div id="codeBox"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const code = params.get("code");
const error = params.get("error");

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxuD3SC-gvWSD1UAZojbC4bpKtnZk_QKNwSt4ZhN0Xbx6gSmt6qEYFwovNzouORCuV4/exec";

const status = document.getElementById("status");
const codeBox = document.getElementById("codeBox");


// ⭐ VERY IMPORTANT — prevent redirect loop
if(window.location.pathname.includes("/redirect/") === false){

status.innerText="Invalid redirect page";

throw new Error("Wrong page");

}


// ⭐ ERROR FROM TIKTOK
if(error){

status.innerText="TikTok authentication error";

codeBox.innerText=error;

throw new Error(error);

}


// ⭐ SUCCESS — WE GOT CODE
if(code){

status.innerText="Authentication code received";

codeBox.innerText=code.substring(0,20)+"...";

setTimeout(()=>{

// ⭐ HARD REDIRECT — THIS FIXES YOUR LOOP
window.location.replace(
SCRIPT_URL + "?code=" + encodeURIComponent(code)
);

},1500);

}


// ⭐ NO CODE
else{

status.innerText="No code received";

}

</script>

</body>
</html>
